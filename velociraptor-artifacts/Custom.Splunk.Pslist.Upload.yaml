name: Custom.Splunk.Pslist.Upload
description: |
  Upload PsList rows to Splunk HEC.

  This artifact was used in the AI Browser Threat Monitoring System lab
  to test Velociraptor-to-Splunk forwarding.

type: SERVER

parameters:
  - name: SplunkURL
    type: string
    default: http://192.168.56.10:8088/services/collector
    description: Splunk HEC collector URL.

  - name: Token
    type: string
    default: <SPLUNK_HEC_TOKEN>
    description: Splunk HEC token. Replace before use. Do not commit real tokens.

sources:
  - query: |
      LET rows = SELECT Name,
                        Pid,
                        Ppid,
                        Username,
                        CommandLine,
                        Exe,
                        "velociraptor-server" AS hostname,
                        timestamp(epoch=now()) AS timestamp
      FROM pslist()

      SELECT *
      FROM splunk_upload(
        query=rows,
        url=SplunkURL,
        index="main",
        sourcetype="velociraptor:pslist",
        skip_verify=True,
        wait_time=5,
        token=Token
      )